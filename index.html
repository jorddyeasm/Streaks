<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rachas" />
  <title>Rachas</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f0ece4;
      --muted: #6b6560;
      --accent: #e8ff47;
      --accent2: #ff6b35;
      --danger: #ff3b3b;
      --success: #47ffb2;
      --radius: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ── HEADER ── */
    header {
      padding: calc(var(--safe-top) + 20px) 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    #btn-add {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #0f0f0f;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, opacity .15s;
    }
    #btn-add:active { transform: scale(.92); opacity: .8; }

    /* ── EMPTY STATE ── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 80px 40px;
      text-align: center;
    }
    #empty .icon { font-size: 56px; }
    #empty h2 { font-size: 20px; font-weight: 800; }
    #empty p { color: var(--muted); font-size: 14px; line-height: 1.6; }

    /* ── GRID ── */
    #grid {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: calc(var(--safe-bottom) + 24px);
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 18px 18px 14px;
      position: relative;
      overflow: hidden;
      transition: transform .15s;
      animation: slideIn .3s ease;
    }
    .card:active { transform: scale(.985); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-glow {
      position: absolute;
      top: -30px; right: -30px;
      width: 100px; height: 100px;
      border-radius: 50%;
      filter: blur(40px);
      opacity: .25;
      pointer-events: none;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .card-info { flex: 1; }

    .card-emoji { font-size: 26px; margin-bottom: 4px; }

    .card-name {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.2;
      word-break: break-word;
    }

    .card-desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      font-family: 'Space Mono', monospace;
    }

    .card-streak {
      text-align: right;
      flex-shrink: 0;
    }

    .streak-num {
      font-family: 'Space Mono', monospace;
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
    }

    .streak-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Space Mono', monospace;
    }

    .streak-best {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      margin-top: 2px;
    }

    /* progress bar */
    .bar-wrap {
      background: var(--surface2);
      border-radius: 99px;
      height: 5px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .5s ease;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .btn-check {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #0f0f0f;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .15s;
    }
    .btn-check:active { opacity: .75; transform: scale(.97); }
    .btn-check.done {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-check.done:active { opacity: .6; }

    .btn-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    .btn-icon:active { background: var(--border); }

    .chip-today {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      background: color-mix(in srgb, var(--success) 12%, transparent);
      color: var(--success);
      border-radius: 99px;
      padding: 3px 9px;
      margin-bottom: 8px;
    }

    /* ── MODAL ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex; align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      width: 100%;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      border-top: 1px solid var(--border);
      padding: 12px 20px calc(var(--safe-bottom) + 28px);
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,1,.52,1);
    }
    .overlay.open .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin: 0 auto 20px;
    }

    .sheet h2 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }

    input[type=text], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color .2s;
    }
    input[type=text]:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: none; height: 70px; }

    .emoji-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .emoji-opt {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, background .15s;
    }
    .emoji-opt.selected {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
    }

    .color-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .color-opt {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .15s, transform .15s;
    }
    .color-opt.selected { border-color: var(--text); transform: scale(1.2); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: var(--accent);
      color: #0f0f0f;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-primary:active { opacity: .8; }

    /* delete confirm */
    .del-confirm {
      position: absolute; inset: 0;
      background: rgba(15,15,15,.95);
      border-radius: var(--radius);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      padding: 20px;
      text-align: center;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .del-confirm.show { opacity: 1; pointer-events: all; }
    .del-confirm p { font-size: 14px; color: var(--muted); }
    .del-confirm .del-btns { display: flex; gap: 10px; width: 100%; }
    .btn-cancel, .btn-delete {
      flex: 1; padding: 10px; border-radius: 10px;
      border: none; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .btn-cancel { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-delete { background: var(--danger); color: #fff; }

    /* toast */
    #toast {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 20px);
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-family: 'Space Mono', monospace;
      padding: 10px 18px;
      border-radius: 99px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      z-index: 200;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* install banner */
    #install-banner {
      margin: 12px 16px 0;
      background: color-mix(in srgb, var(--accent) 8%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      border-radius: 14px;
      padding: 12px 14px;
      display: none;
      align-items: center;
      gap: 10px;
    }
    #install-banner.show { display: flex; }
    #install-banner p { flex: 1; font-size: 12px; color: var(--text); line-height: 1.4; }
    #install-banner p strong { color: var(--accent); }
    #btn-install {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #0f0f0f;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    #btn-dismiss { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; }
  </style>
</head>
<body>

<header>
  <div class="logo">ra<span>chas</span></div>
  <button id="btn-add" title="Nueva racha">+</button>
</header>

<div id="install-banner">
  <p>📲 <strong>Instala la app</strong> para usarla sin internet</p>
  <button id="btn-install">Instalar</button>
  <button id="btn-dismiss">×</button>
</div>

<div id="empty" style="display:none">
  <div class="icon">🔥</div>
  <h2>Sin rachas todavía</h2>
  <p>Toca el <strong>+</strong> para crear tu primera racha y empezar a construir hábitos.</p>
</div>

<div id="grid"></div>

<!-- Modal nueva racha -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="modal-title">Nueva racha</h2>

    <label>Nombre</label>
    <input type="text" id="inp-name" placeholder="Ej: Ir al gimnasio" maxlength="40" />

    <label>Descripción (opcional)</label>
    <textarea id="inp-desc" placeholder="Ej: Al menos 30 min..."></textarea>

    <label>Emoji</label>
    <div class="emoji-row" id="emoji-row"></div>

    <label>Color</label>
    <div class="color-row" id="color-row"></div>

    <button class="btn-primary" id="btn-save">Crear racha</button>
  </div>
</div>

<div id="toast"></div>

<script>
const EMOJIS = ['🔥','💪','📚','🏃','🧘','💧','🥗','😴','🚴','✍️','🎯','🎸','🧠','🌿','☀️','🚭','📵','🍺'];
const COLORS = ['#e8ff47','#ff6b35','#47ffb2','#ff4f8b','#6b9fff','#c47aff','#ffcb47','#ff3b3b'];

let habits = JSON.parse(localStorage.getItem('rachas_v1') || '[]');
let editId = null;
let selectedEmoji = EMOJIS[0];
let selectedColor = COLORS[0];
let deferredPrompt = null;

// ── RENDER ──────────────────────────────────────────────
function todayKey() {
  return new Date().toISOString().slice(0,10);
}

function getStreak(h) {
  if (!h.logs || h.logs.length === 0) return 0;
  const sorted = [...h.logs].sort().reverse();
  let streak = 0;
  let d = new Date(); d.setHours(0,0,0,0);
  for (const log of sorted) {
    const logD = new Date(log + 'T00:00:00');
    const diff = Math.round((d - logD) / 86400000);
    if (diff === 0 || diff === streak) { if(diff===0||diff===streak){streak++; d=logD;} }
    else if (diff === streak) { streak++; d = logD; }
    else break;
  }
  // rebuild properly
  return calcStreak(h.logs);
}

function calcStreak(logs) {
  if (!logs || logs.length === 0) return 0;
  const set = new Set(logs);
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  let d = new Date(today);
  while (true) {
    const key = d.toISOString().slice(0,10);
    if (set.has(key)) { streak++; d.setDate(d.getDate()-1); }
    else { break; }
  }
  return streak;
}

function calcBest(logs) {
  if (!logs || logs.length === 0) return 0;
  const sorted = [...new Set(logs)].sort();
  let best = 1, cur = 1;
  for (let i = 1; i < sorted.length; i++) {
    const a = new Date(sorted[i-1]+'T00:00:00');
    const b = new Date(sorted[i]+'T00:00:00');
    const diff = Math.round((b-a)/86400000);
    if (diff === 1) { cur++; best = Math.max(best, cur); }
    else { cur = 1; }
  }
  return best;
}

function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  grid.innerHTML = '';

  if (habits.length === 0) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';

  habits.forEach(h => {
    const streak = calcStreak(h.logs);
    const best = calcBest(h.logs);
    const doneToday = h.logs && h.logs.includes(todayKey());
    const progress = best > 0 ? Math.min(streak / best, 1) : (streak > 0 ? 1 : 0);

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = h.id;

    card.innerHTML = `
      <div class="card-glow" style="background:${h.color}"></div>
      ${doneToday ? `<div class="chip-today">✓ Completado hoy</div>` : ''}
      <div class="card-top">
        <div class="card-info">
          <div class="card-emoji">${h.emoji}</div>
          <div class="card-name">${h.name}</div>
          ${h.desc ? `<div class="card-desc">${h.desc}</div>` : ''}
        </div>
        <div class="card-streak">
          <div class="streak-num" style="color:${h.color}">${streak}</div>
          <div class="streak-label">días</div>
          <div class="streak-best">récord: ${best}</div>
        </div>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${progress*100}%;background:${h.color}"></div>
      </div>
      <div class="card-actions">
        <button class="btn-check ${doneToday?'done':''}" data-action="check">
          ${doneToday ? '✓ Hecho hoy' : '✔ Marcar hoy'}
        </button>
        <button class="btn-icon" data-action="edit" title="Editar">✏️</button>
        <button class="btn-icon" data-action="delete" title="Eliminar">🗑️</button>
      </div>
      <div class="del-confirm">
        <div style="font-size:32px">🗑️</div>
        <strong>¿Eliminar racha?</strong>
        <p>Perderás todo el historial de "${h.name}"</p>
        <div class="del-btns">
          <button class="btn-cancel" data-action="cancel-del">Cancelar</button>
          <button class="btn-delete" data-action="confirm-del">Eliminar</button>
        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

// ── EVENTS ──────────────────────────────────────────────
document.getElementById('grid').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const card = btn.closest('.card');
  const id = card.dataset.id;
  const h = habits.find(x => x.id === id);
  const action = btn.dataset.action;

  if (action === 'check') {
    const today = todayKey();
    if (!h.logs) h.logs = [];
    if (h.logs.includes(today)) {
      h.logs = h.logs.filter(d => d !== today);
      showToast('Desmarcado 📅');
    } else {
      h.logs.push(today);
      const streak = calcStreak(h.logs);
      showToast(streak > 1 ? `🔥 ¡${streak} días seguidos!` : '✅ ¡Marcado!');
    }
    save(); render();
  }

  if (action === 'edit') { openEdit(h); }

  if (action === 'delete') {
    card.querySelector('.del-confirm').classList.add('show');
  }
  if (action === 'cancel-del') {
    card.querySelector('.del-confirm').classList.remove('show');
  }
  if (action === 'confirm-del') {
    habits = habits.filter(x => x.id !== id);
    save(); render();
    showToast('Racha eliminada');
  }
});

// ── MODAL ──────────────────────────────────────────────
function buildModalOptions() {
  const er = document.getElementById('emoji-row');
  er.innerHTML = '';
  EMOJIS.forEach(em => {
    const b = document.createElement('button');
    b.className = 'emoji-opt' + (em === selectedEmoji ? ' selected' : '');
    b.textContent = em;
    b.onclick = () => {
      selectedEmoji = em;
      er.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
    };
    er.appendChild(b);
  });

  const cr = document.getElementById('color-row');
  cr.innerHTML = '';
  COLORS.forEach(col => {
    const b = document.createElement('button');
    b.className = 'color-opt' + (col === selectedColor ? ' selected' : '');
    b.style.background = col;
    b.onclick = () => {
      selectedColor = col;
      cr.querySelectorAll('.color-opt').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
    };
    cr.appendChild(b);
  });
}

function openAdd() {
  editId = null;
  selectedEmoji = EMOJIS[0];
  selectedColor = COLORS[0];
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-desc').value = '';
  document.getElementById('modal-title').textContent = 'Nueva racha';
  document.getElementById('btn-save').textContent = 'Crear racha';
  buildModalOptions();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('inp-name').focus(), 350);
}

function openEdit(h) {
  editId = h.id;
  selectedEmoji = h.emoji;
  selectedColor = h.color;
  document.getElementById('inp-name').value = h.name;
  document.getElementById('inp-desc').value = h.desc || '';
  document.getElementById('modal-title').textContent = 'Editar racha';
  document.getElementById('btn-save').textContent = 'Guardar cambios';
  buildModalOptions();
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

document.getElementById('btn-add').onclick = openAdd;
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

document.getElementById('btn-save').onclick = () => {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { showToast('⚠️ Escribe un nombre'); return; }

  if (editId) {
    const h = habits.find(x => x.id === editId);
    h.name = name;
    h.desc = document.getElementById('inp-desc').value.trim();
    h.emoji = selectedEmoji;
    h.color = selectedColor;
    showToast('✏️ Racha actualizada');
  } else {
    habits.unshift({
      id: Date.now().toString(),
      name,
      desc: document.getElementById('inp-desc').value.trim(),
      emoji: selectedEmoji,
      color: selectedColor,
      logs: [],
      created: todayKey()
    });
    showToast('🎉 ¡Racha creada!');
  }
  save(); render(); closeModal();
};

// ── UTILS ──────────────────────────────────────────────
function save() { localStorage.setItem('rachas_v1', JSON.stringify(habits)); }

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── PWA INSTALL ────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});

document.getElementById('btn-install').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
};

document.getElementById('btn-dismiss').onclick = () => {
  document.getElementById('install-banner').classList.remove('show');
};

// ── SERVICE WORKER ─────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

render();
</script>
</body>
</html>
